<style>

<script>

const DATA = [
 {t:'label', x:'Texto Áureo.'},
 {t:'quote', x:'"E eis que estou contigo, e te guardarei por onde quer que fores, e te farei tornar a esta terra, porque te não deixarei, até que te haja feito o que te tenho dito." Gênesis, capítulo 28, versículo 15.'},

 {t:'label', x:'Verdade Prática.'},
 {t:'body',  x:'Após um encontro com Deus, Jacó é transformado. Ninguém sai da presença do Senhor da mesma maneira.'},

 {t:'label', x:'Leitura Diária.'},
 {t:'daily', x:'Segunda. Gênesis, capítulo 17, versículo 5. Deus transformou Abrão em Abraão.'},
 {t:'daily', x:'Terça. Gênesis, capítulo 17, versículo 15. Deus transformou Sarai em Sara.'},
 {t:'daily', x:'Quarta. Gênesis, capítulo 32, versículo 28. Deus transformou Jacó em Israel.'},
 {t:'daily', x:'Quinta. João, capítulo 1, versículo 42. Deus transformou completamente a vida de Pedro.'},
 {t:'daily', x:'Sexta. Atos, capítulo 13, versículo 9. Deus transformou a vida de Saulo.'},
 {t:'daily', x:'Sábado. João, capítulo 20, versículo 16; e Marcos, capítulo 5, versículo 19. Jesus transforma vidas.'},

 {t:'label', x:'Leitura Bíblica em Classe.'},
 {t:'versehead', x:'Gênesis, capítulo 28, versículos 10 a 17.'},
 {t:'verse', x:'Versículo 10. Partiu, pois, Jacó de Berseba e foi-se para Harã.'},
 {t:'verse', x:'Versículo 11. E chegou a um lugar onde passou a noite, porque já o sol era posto; e tomou uma das pedras daquele lugar, e a pôs por sua cabeceira, e deitou-se naquele lugar.'},
 {t:'verse', x:'Versículo 12. E sonhou: e eis que era posta na terra uma escada cujo topo tocava nos céus; e eis que os anjos de Deus subiam e desciam por ela.'},
 {t:'verse', x:'Versículo 13. E eis que o Senhor estava em cima dela e disse: Eu sou o Senhor, o Deus de Abraão, teu pai, e o Deus de Isaque; esta terra em que estás deitado, ta darei a ti e à tua semente.'},
 {t:'verse', x:'Versículo 14. E a tua semente será como o pó da terra; e estender-se-á ao ocidente, e ao oriente, e ao norte, e ao sul; e em ti e na tua semente serão benditas todas as famílias da terra.'},
 {t:'verse', x:'Versículo 15. E eis que estou contigo, e te guardarei por onde quer que fores, e te farei tornar a esta terra, porque te não deixarei, até que seja feito o que te tenho dito.'},
 {t:'verse', x:'Versículo 16. Acordando, pois, Jacó do seu sono, disse: Na verdade, o Senhor está neste lugar, e eu não o sabia.'},
 {t:'verse', x:'Versículo 17. E temeu e disse: Quão terrível é este lugar! Este não é outro lugar senão a Casa de Deus; e esta é a porta dos céus.'},
 {t:'body', x:'Hinos sugeridos: quarenta e dois, duzentos e noventa e dois, e quatrocentos e setenta, da Harpa Cristã.'},

 {t:'divider', x:'Plano de Aula'},
 {t:'subtopic', x:'1. Introdução.'},
 {t:'body', x:'Você acredita na transformação do ser humano? Na metanoia, a mudança profunda no modo de pensar, sentir e agir que o Espírito Santo realiza em nós de dentro para fora. Essa é a transformação que veremos na vida do patriarca Jacó. Seu processo começou quando, fugindo da casa dos pais, teve um encontro com Deus em um sonho. Jacó recebeu o nome de enganador, carregando um estigma por anos; contudo, Deus, em Seus desígnios, já o havia escolhido e, passo a passo, transformou sua história por completo. Sua vida nos mostra que ninguém está além do alcance da graça divina.'},

 {t:'subtopic', x:'2. Apresentação da Lição.'},
 {t:'body', x:'Objetivos da Lição. Primeiro, enfatizar que o sonho de Jacó foi o início de uma mudança profunda em sua vida. Segundo, expor as descobertas de Jacó. Terceiro, explicar o que era a coluna de Betel.'},
 {t:'body', x:'Motivação. Deus já falou com você por meio de um sonho? O Senhor comunica-se conosco de diversas maneiras, e foi assim que Ele revelou-se a Jacó, em sonho, enquanto este fugia da casa dos pais, sozinho no deserto. Jacó viu uma escada firmada na terra, cujo topo alcançava os céus, e anjos de Deus subindo e descendo por ela. Ali, na solidão da noite, ele teve um encontro real com o Eterno. A partir desse momento, iniciou-se em sua vida um profundo processo de transformação. Deus conhecia Jacó, inclusive suas falhas e enganos; embora não aprovasse seus atos, não revogou a bênção prometida a seus pais. Pelo contrário, trabalhou em seu caráter, moldando-o até torná-lo um novo homem, testemunho vivo da graça que restaura e renova.'},
 {t:'body', x:'Sugestão de Método. Pergunte diretamente aos alunos: o que é metanoia? Incentive a participação dos alunos e ouça a todos com atenção. Diga que metanoia é uma mudança profunda no nosso modo de pensar, sentir e agir. Romanos, capítulo 12, versículo 2. É algo que somente o Espírito Santo pode realizar em nós. Sem a atuação do Consolador, não há transformação, não há Novo Nascimento. Jacó, antes da transformação em sua vida, era oportunista, pois, quando seu irmão chegou com fome e pediu para comer do seu guisado, ele poderia ter compartilhado sua refeição. Mas, numa prova de oportunismo e ambição, pediu que o irmão lhe vendesse a sua primogenitura. Gênesis, capítulo 25, versículo 31. Ele foi frio e calculista. Gênesis, capítulo 25, versículo 33; e Hebreus, capítulo 12, versículo 16.'},

 {t:'subtopic', x:'3. Conclusão da Lição.'},
 {t:'body', x:'Aplicação. Depois de fazer toda a exposição dos tópicos da Lição, aplique as verdades estudadas, mostrando que, após ter um encontro com Deus, todos são transformados. Ninguém sai da presença de Deus da mesma maneira.'},

 {t:'subtopic', x:'4. Subsídio ao Professor.'},
 {t:'body', x:'Revista Ensinador Cristão. Vale a pena conhecer essa revista que traz reportagens, artigos, entrevistas e subsídios de apoio às Lições Bíblicas Adultos. Na edição 105, página 41, você encontrará um subsídio especial para esta lição.'},
 {t:'body', x:'Auxílios Especiais. Ao final do tópico, você encontrará auxílios que darão suporte na preparação de sua aula. Primeiro, o texto Os Anjos de Deus, localizado depois do primeiro tópico, aprofunda o assunto a respeito dos anjos. Segundo, o texto Jacó, localizado depois do segundo tópico, revela um pouco quem era Jacó antes de ser transformado pelo Senhor.'},

 {t:'divider', x:'Comentário'},
 {t:'label', x:'Introdução.'},
 {t:'body', x:'Na lição anterior, vimos que o relacionamento entre Esaú e Jacó era conflituoso, a ponto de Esaú planejar matar Jacó depois do episódio que resultou na perda da bênção que seria sua após a morte de Isaque. Ante a ameaça de uma possível tragédia, Rebeca e Isaque aconselharam Jacó a ir embora para a casa de seu tio Labão, em Harã. Jacó tornou-se um fugitivo e saiu de casa sem levar nada, indo em direção ao deserto. Mas Deus revelou-se a ele num sonho que mudou sua vida.'},
 {t:'label', x:'Palavra-chave.'},
 {t:'body', x:'Transformação.'},

 {t:'topic', x:'Tópico 1. Um sonho que mudou uma vida.'},
 {t:'subtopic', x:'1. Uma escada que tocava o céu.'},
 {t:'body', x:'Durante sua fuga da casa de seus pais, Jacó dormiu e teve um sonho divino. Em seu sonho, ele viu uma escada cujo topo tocava os céus. Os anjos de Deus subiam e desciam por ela. Gênesis, capítulo 28, versículo 12. A Bíblia diz que os anjos são espíritos ministradores. Hebreus, capítulo 1, versículo 14. Eles trabalham para aqueles que confiam em Deus. Nas Escrituras Sagradas, vemos, por diversas vezes, o Senhor revelando sua vontade aos seus servos por intermédio de sonhos e dos anjos. No Novo Testamento, lemos que José, o esposo de Maria, teve um sonho em que um anjo lhe falou que ele não deveria deixá-la, porque o que nela foi gerado era do Espírito Santo. Mateus, capítulo 1, versículos 19 e 20. Segundo Números, capítulo 12, versículo 6, o Senhor revela-se em visões e sonhos aos seus profetas. Deus desejava falar e fazer algo na vida de Jacó.'},
 {t:'subtopic', x:'2. Deus apresentou-se em sonhos a Jacó.'},
 {t:'body', x:'Em seu sonho, Jacó não somente viu os anjos, mas Deus apresentou-se a ele no topo da escada. O Senhor falou com Jacó de modo semelhante ao que falara a seu pai. O Eterno fala a respeito do seu pacto com Abraão e Isaque, prometendo que daria a Jacó a terra em que ele estava deitado. Aquela terra seria de Jacó e de sua descendência. Certamente, Jacó estava temeroso ao ter que deixar sua família e seguir em direção a um lugar desconhecido; então, o Senhor, ainda em sonho, consola-o dizendo que estaria com ele e o guardaria de todo o perigo. Gênesis, capítulo 28, versículos 13 a 15.'},
 {t:'subtopic', x:'3. As promessas de Deus a Jacó.'},
 {t:'body', x:'Deus revelou-se a Jacó em sonhos e lhe fez promessas. Primeiro, prometeu dar-lhe a terra em que ele achava-se deitado, naquela noite sombria. Gênesis, capítulo 28, versículo 13. Depois, prometeu que sua semente seria tão numerosa como o pó da terra, e que ocuparia os quatro cantos da terra: ao ocidente, ao oriente, ao norte e ao sul. Em seguida, repetiu a promessa que fizera a Abraão e a Isaque: e a tua semente será como o pó da terra. Gênesis, capítulo 28, versículo 14. Por último, prometeu-lhe que estaria com ele e o guardaria por onde quer que andasse, e que lhe faria retornar à terra onde ele encontrava-se, e não o deixaria até que cumprisse o que lhe havia dito. Gênesis, capítulo 28, versículo 14.'},

 {t:'aux', label:'Ampliando o Conhecimento. Jacó.', x:'Renomeado Israel pelo Senhor, em Gênesis, capítulo 32, versículo 28, Jacó foi o filho de Isaque e Rebeca, e pai de doze filhos, cujos descendentes tornaram-se as doze tribos. Metade do livro de Gênesis, de Gênesis, capítulo 25, versículo 19, a capítulo 49, versículo 33, narra a sua história e a dos seus filhos. Os capítulos intermediários de Gênesis concentram-se nas suas lutas com o seu irmão Esaú e com o seu tio Labão, e os capítulos posteriores concentram-se nos seus filhos Diná, Judá e, particularmente, José, durante o tempo deste no Egito. Amplie mais seus conhecimentos com a ajuda do Dicionário Bíblico Baker, editado pela CPAD, página 267.'},

 {t:'label', x:'Sinopse 1.'},
 {t:'body', x:'Deus revelou-se a Jacó em sonhos, iniciando um processo de transformação em sua vida.'},

 {t:'aux', label:'Auxílio Bibliológico. Os Anjos de Deus.', x:'A visão dos anjos que Jacó teve sugere que eles desempenhavam importante papel ao guiar e proteger o povo de Deus. Sob o novo concerto, o plano e a promessa de Deus de salvar as pessoas do pecado por meio do sacrifício de seu Filho, Jesus Cristo, os anjos também são ativos na vida das pessoas. Deus apareceu a Jacó com a mensagem de que a bênção prometida a seu avô, Abraão, continuaria por meio dele. Confira Gênesis, capítulo 12, versículo 3; e Gênesis, capítulo 13, versículos 14 a 17. Esta bênção incluía a presença de Deus, a sua orientação e proteção. Bíblia de Estudo Pentecostal para Jovens. Rio de Janeiro, CPAD, página 56.'},

 {t:'topic', x:'Tópico 2. As descobertas de Jacó.'},
 {t:'subtopic', x:'1. Jacó descobriu a presença de Deus.'},
 {t:'body', x:'Depois de despertar do seu sono, Jacó disse: na verdade, o Senhor está neste lugar, e eu não o sabia. Gênesis, capítulo 28, versículo 16. Ele estava vivendo um dos piores momentos de sua vida, fugindo do seu lar em direção à casa de seu tio, e correndo o risco de ser morto por Esaú. No entanto, é nesse momento de adversidade que Deus revelou-se e mostrou que Jacó não estava sozinho. Isso nos lembra Jó, que disse que a dor e a aflição fizeram-no conhecer a Deus de modo pessoal. Jó, capítulo 42, versículo 5.'},
 {t:'subtopic', x:'2. Jacó descobriu a Casa de Deus.'},
 {t:'body', x:'Jacó ficou tão impactado com seu sonho, com a revelação de Deus e sua presença naquele lugar, que exclamou com temor: quão terrível é este lugar! Este não é outro lugar senão a Casa de Deus. Gênesis, capítulo 28, versículo 17. Foi uma experiência extraordinária. Sozinho, em meio à escuridão, ele jamais esperaria ter um encontro tão real com Deus. O Senhor estava iniciando um processo de transformação na vida de Jacó. Haveria uma mudança de dentro para fora no patriarca.'},
 {t:'subtopic', x:'3. Jacó descobriu a porta dos céus.'},
 {t:'body', x:'Sabemos que uma porta é uma abertura, através da qual temos acesso a determinado ambiente. Na Nova Aliança, conforme nos revela a Palavra de Deus, a porta de acesso aos céus é Jesus Cristo. Ele mesmo declarou: eu sou a porta; se alguém entrar por mim, salvar-se-á, e entrará, e sairá, e achará pastagens. João, capítulo 10, versículo 9. Hoje, não há outra maneira de chegar-se a Deus, ser transformado e santificado, senão por intermédio de Jesus Cristo.'},

 {t:'label', x:'Sinopse 2.'},
 {t:'body', x:'Depois do seu encontro transformador com Deus, Jacó fez muitas descobertas.'},

 {t:'aux', label:'Auxílio Bibliológico. Jacó.', x:'Ele fazia tudo, o certo e o errado, com grande zelo. Ele enganou seu próprio irmão Esaú, e seu pai, Isaque. Ele lutou com Deus, e trabalhou catorze anos para se casar com a mulher que amava. Por intermédio de Jacó, aprendemos como um forte líder pode, também, ser um servo. Também vemos como ações erradas sempre voltam para nos perturbar. Depois de enganar Esaú, Jacó correu para salvar sua vida, viajando mais de 640 quilômetros até Harã, onde vivia seu tio, Labão. Pelo caminho, ele recebeu uma mensagem do Senhor, em um sonho, e deu a esse lugar o nome de Betel. Em Harã, Jacó se casou e iniciou uma família. Bíblia de Estudo Cronológica Aplicação Pessoal. Rio de Janeiro, CPAD, página 58.'},

 {t:'topic', x:'Tópico 3. A coluna de Betel.'},
 {t:'subtopic', x:'1. A pedra transformada em coluna.'},

/* ============================================================
   RENDERIZAÇÃO
   ============================================================ */
const reader = document.getElementById('reader');
const segIndexEls = []; // elementos faláveis na ordem de leitura

function tokenize(el, text){
  // quebra por espaços preservando posição de caractere para casar com o boundary do TTS
  let i = 0;
  const re = /(\s+)/;
  const parts = text.split(re);
  let charPos = 0;
  for(const part of parts){
    if(part === '') continue;
    if(/^\s+$/.test(part)){
      el.appendChild(document.createTextNode(part));
      charPos += part.length;
    } else {
      const w = document.createElement('span');
      w.className = 'w';
      w.textContent = part;
      w.dataset.start = charPos;
      w.dataset.end = charPos + part.length;
      el.appendChild(w);
      charPos += part.length;
    }
  }
}

DATA.forEach(item=>{
  if(item.t === 'divider'){
    const d = document.createElement('div');
    d.className = 'sec-divider';
    d.innerHTML = '<span></span>';
    d.querySelector('span').textContent = item.x;
    reader.appendChild(d);
    return;
  }
  if(item.t === 'aux'){
    const box = document.createElement('div');
    box.className = 'aux';
    const lab = document.createElement('div');
    lab.className = 'label';
    box.appendChild(lab);
    // a label do auxílio também é falada
    const labSeg = document.createElement('div');
    labSeg.className = 'seg'; labSeg.tabIndex = 0;
    tokenize(labSeg, item.label);
    lab.appendChild(labSeg);
    segIndexEls.push(labSeg);

    const p = document.createElement('div');
    p.className = 'seg'; p.tabIndex = 0;
    p.style.fontStyle = 'italic';
    tokenize(p, item.x);
    box.appendChild(p);
    segIndexEls.push(p);
    reader.appendChild(box);
    return;
  }

  const el = document.createElement('div');
  el.className = 'seg ' + (
    item.t==='label'?'label':
    item.t==='topic'?'topic':
    item.t==='subtopic'?'subtopic':
    item.t==='versehead'?'versehead':
    item.t==='verse'?'verse':
    item.t==='daily'?'daily':'body'
  );
  if(item.t==='quote') el.className = 'seg quote';
  if(item.t==='body') el.classList.add('body');
  el.tabIndex = 0;
  tokenize(el, item.x);
  reader.appendChild(el);
  segIndexEls.push(el);
});

/* ============================================================
   SÍNTESE DE VOZ + DESTAQUE
   ============================================================ */
const synth = window.speechSynthesis;
let voices = [];
let current = 0;
let playing = false;
let stopped = true;

const $play = document.getElementById('play');
const $pause = document.getElementById('pause');
const $stop = document.getElementById('stop');
const $rate = document.getElementById('rate');
const $rateVal = document.getElementById('rateVal');
const $voice = document.getElementById('voice');
const $status = document.getElementById('status');

if(!synth){
  $status.textContent = 'Seu navegador não suporta leitura em voz alta. Tente o Chrome, Edge ou Safari.';
  $play.disabled = true;
}

function loadVoices(){
  voices = synth.getVoices();
  const pt = voices.filter(v => /pt/i.test(v.lang));
  const list = pt.length ? pt : voices;
  $voice.innerHTML = '';
  list.forEach(v=>{
    const o = document.createElement('option');
    o.value = v.name;
    o.textContent = v.name + (/pt.?br/i.test(v.lang) ? '  (Brasil)' : '  ['+v.lang+']');
    $voice.appendChild(o);
  });
  // preferir uma voz pt-BR
  const br = list.find(v=>/pt.?br/i.test(v.lang));
  if(br) $voice.value = br.name;
}
if(synth){
  loadVoices();
  synth.onvoiceschanged = loadVoices;
}

function chosenVoice(){
  return voices.find(v=>v.name === $voice.value) || voices.find(v=>/pt/i.test(v.lang)) || null;
}

function clearWordHL(el){
  if(!el) return;
  el.querySelectorAll('.w.spoken').forEach(w=>w.classList.remove('spoken'));
}
function clearAll(){
  segIndexEls.forEach(s=>{ s.classList.remove('active'); clearWordHL(s); });
}

function speakFrom(i){
  if(i >= segIndexEls.length){ finish(); return; }
  current = i;
  const el = segIndexEls[i];
  const text = el.textContent.trim();

  clearAll();
  el.classList.add('active');
  el.scrollIntoView({behavior:'smooth', block:'center'});

  const u = new SpeechSynthesisUtterance(text);
  const v = chosenVoice();
  if(v) u.voice = v;
  u.lang = (v && v.lang) || 'pt-BR';
  u.rate = parseFloat($rate.value);

  const words = Array.from(el.querySelectorAll('.w'));
  u.onboundary = (e)=>{
    if(e.charIndex == null) return;
    clearWordHL(el);
    // casa o índice do caractere com o intervalo da palavra
    let hit = null;
    for(const w of words){
      const s = +w.dataset.start, en = +w.dataset.end;
      if(e.charIndex >= s && e.charIndex < en){ hit = w; break; }
      if(e.charIndex < s){ hit = w; break; }
    }
    if(hit) hit.classList.add('spoken');
  };
  u.onend = ()=>{
    clearWordHL(el);
    if(stopped) return;
    speakFrom(i+1);
  };
  u.onerror = ()=>{ if(!stopped) speakFrom(i+1); };

  $status.textContent = 'Lendo… trecho ' + (i+1) + ' de ' + segIndexEls.length;
  synth.speak(u);
}

function start(fromIndex){
  if(!synth) return;
  stopped = false; playing = true;
  synth.cancel();
  $play.disabled = true; $pause.disabled = false; $stop.disabled = false;
  $pause.textContent = '⏸ Pausar';
  speakFrom(fromIndex != null ? fromIndex : current);
}
function finish(){
  playing = false; stopped = true;
  clearAll();
  $play.disabled = false; $pause.disabled = true; $stop.disabled = true;
  $play.textContent = '▶ Ouvir';
  $status.textContent = 'Leitura concluída.';
  current = 0;
}

$play.addEventListener('click', ()=>{
  if(synth.paused && playing){
    synth.resume(); $pause.disabled=false; $pause.textContent='⏸ Pausar';
    $status.textContent = 'Retomando…';
    return;
  }
  $play.textContent = '▶ Ouvir';
  start(current);
});
$pause.addEventListener('click', ()=>{
  if(synth.paused){
    synth.resume(); $pause.textContent='⏸ Pausar'; $status.textContent='Retomando…';
  } else {
    synth.pause(); $pause.textContent='▶ Continuar'; $status.textContent='Pausado.';
  }
});
$stop.addEventListener('click', ()=>{
  stopped = true; playing = false;
  synth.cancel();
  finish();
  $status.textContent = 'Parado.';
});
$rate.addEventListener('input', ()=>{
  $rateVal.textContent = parseFloat($rate.value).toFixed(2)+'×';
});

// clique em qualquer trecho começa a leitura a partir dele
segIndexEls.forEach((el, idx)=>{
  const go = ()=>{ start(idx); };
  el.addEventListener('click', go);
  el.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(); }});
});

// segurança: cancelar fala ao fechar
window.addEventListener('beforeunload', ()=>{ try{ synth.cancel(); }catch(e){} });
</script>
